<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Loop</title>
  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #ffffff;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 0.95rem;
      color: #a1a1aa;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .btn {
      display: inline-block;
      background-color: #6366f1;
      color: #ffffff;
      text-decoration: none;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #4f46e5;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌀</div>
    <h1>You are offline</h1>
    <p>Loop is currently running in local offline mode. You can continue updating your daily checklist and journal reflections. They will sync automatically when your internet connection returns.</p>
    <a href="/dashboard" class="btn">Reload Dashboard</a>
  </div>
</body>
</html>
